<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أعضاء القيادة | S.S.F</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #000; 
            color: white; 
            padding: 20px; 
            overflow-x: hidden;
        }
        
        .back-btn { 
            background: #111; padding: 10px 20px; border-radius: 10px; 
            display: inline-flex; align-items: center; gap: 8px; 
            text-decoration: none; color: white; margin-bottom: 25px; 
            transition: 0.3s;
        }

        .staff-card { 
            background: #0a0a0a; border: 1px solid #1a1a1a; 
            padding: 20px; border-radius: 15px; display: flex; 
            align-items: center; justify-content: space-between; 
            margin-bottom: 12px; border-right: 4px solid #fff;
        }

        .rank-info { display: flex; align-items: center; gap: 15px; }
        .icon-box { font-size: 1.5rem; opacity: 0.9; }
        
        .section-divider {
            text-align: center; margin: 30px 0; font-weight: 900; 
            font-size: 1.2rem; letter-spacing: 1px; opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto">
        <a href="index.html" class="back-btn" data-aos="fade-left">
            <i class="fa-solid fa-arrow-right"></i> العودة
        </a>

        <h1 class="text-3xl font-black mb-8 italic" data-aos="fade-down">قيادة القوات الخاصة</h1>

        <div class="staff-card" data-aos="fade-up" data-aos-delay="100" style="border-right-color: #ffd700;">
            <div class="rank-info">
                <div class="icon-box text-yellow-500"><i class="fa-solid fa-shield-halved"></i></div>
                <div>
                    <h3 class="font-black text-lg">سلطان التميمي</h3>
                    <p class="text-xs opacity-50 italic">قائد القوات 🎖️⭐</p>
                </div>
            </div>
        </div>

        <div class="staff-card" data-aos="fade-up" data-aos-delay="200">
            <div class="rank-info">
                <div class="icon-box text-white"><i class="fa-solid fa-clipboard-check"></i></div>
                <div>
                    <h3 class="font-black text-lg">فراس الحربي</h3>
                    <p class="text-xs opacity-50 italic">نائب قائد القوات 🎖️⭐</p>
                </div>
            </div>
        </div>

        <div class="section-divider" data-aos="fade-in">إدارة القطاع</div>

        <div class="staff-card" data-aos="fade-up" data-aos-delay="300">
            <div class="rank-info">
                <div class="icon-box text-gray-400"><i class="fa-solid fa-users-gear"></i></div>
                <div>
                    <h3 class="font-black text-lg">هيثم الاسمري </h3>
                    <p class="text-xs opacity-50">عضو إدارة قوات الامن الخاصة</p>
                </div>
            </div>
        </div>

        <div class="staff-card" data-aos="fade-up" data-aos-delay="400">
            <div class="rank-info">
                <div class="icon-box text-gray-400"><i class="fa-solid fa-sitemap"></i></div>
                <div>
                    <h3 class="font-black text-lg"> منذر الشريف</h3>
                    <p class="text-xs opacity-50">عضو إدارة قوات الامن الخاصة</p>
                </div>
            </div>
        </div>

        <div class="staff-card" data-aos="fade-up" data-aos-delay="500">
            <div class="rank-info">
                <div class="icon-box text-gray-400"><i class="fa-solid fa-briefcase"></i></div>
                <div>
                    <h3 class="font-black text-lg"> عمار العنزي</h3>
                    <p class="text-xs opacity-50">عضو إدارة قوات الامن الخاصة</p>
                </div>
            </div>
        </div>

        <footer class="text-center mt-12 pb-10 opacity-20 text-[10px] font-black tracking-widest">
            S.S.F LEADERSHIP • 2026
        </footer>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
